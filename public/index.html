<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SimMkt — Jaboncillos Bolivia</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Sora:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<!-- ═══════════════════ LOGIN / REGISTRO ═══════════════════ -->
<div id="screen-login" class="screen">
  <div class="login-wrap">

    <!-- LOGIN CARD -->
    <div class="login-card" id="cardLogin">
      <div class="logos-container">
        <img src="images/uagrm.jfif" alt="UAGRM" class="login-logo-img">
        <img src="images/ciencias.jpg" alt="Ciencias Económicas" class="login-logo-img">
        <img src="images/ingcomercial.png" alt="Ingeniería Comercial" class="login-logo-img">
      </div>
      <h1 class="login-title">Simulador de Marketing</h1>
      <p class="login-sub">Mercado Boliviano de Jaboncillos</p>
      <p class="login-sub2">20 Trimestres · Hasta 30 Equipos</p>

      <div class="form-group">
        <label class="form-label">Nombre de equipo o ID de acceso</label>
        <input class="form-input" id="loginId" type="text" placeholder="Ej: Empresa Alfa  ó  admin" autocomplete="username">
      </div>
      <div class="form-group" style="margin-top:14px">
        <label class="form-label">Contraseña</label>
        <input class="form-input" id="loginPass" type="password" placeholder="••••••••" autocomplete="current-password">
      </div>
      <button class="btn btn-primary btn-full" id="btnLogin" style="margin-top:20px">Ingresar →</button>
      <p class="login-error" id="loginError"></p>
      <div class="login-divider"><span>¿Primera vez?</span></div>
      <button class="btn btn-ghost btn-full" id="btnIrRegistro">Registrar mi equipo</button>
      <!-- Botón para abrir el manual desde el login -->
      <button class="btn btn-ghost btn-full" id="btnVerManualLogin" style="margin-top:10px">📘 Ver Manual del Estudiante</button>
    </div>

    <!-- REGISTRO CARD (sin cambios) -->
    <div class="login-card" id="cardRegistro" style="display:none;width:560px;max-width:96vw">
      <!-- ... contenido del registro (lo tienes, no lo cambio) ... -->
    </div>

    <p class="login-footer">UAGRM - Ingeniería Comercial - COM400A Estrategia Comercial – Profesor Jhonny David Atila Lijerón</p>
  </div>
</div>

<!-- ═══════════════════ ADMIN (se mantiene igual) ═══════════════════ -->
<!-- ... todo el contenido de admin y equipo sigue igual que en tu archivo ... -->

<!-- Modal para el manual del estudiante (login) -->
<div id="modalManual" class="modal-overlay hidden">
  <div class="modal-card" style="max-width: 95vw; width: 900px; max-height: 85vh; overflow-y: auto;">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;">
      <h3 style="font-size: 1.2rem;">📘 Manual del Estudiante</h3>
      <button id="btnCerrarModal" class="btn btn-ghost btn-sm">✕</button>
    </div>
    <div id="manualContentContainer"></div>
  </div>
</div>

<div class="toast" id="toast"></div>
<script src="app.js"></script>
</body>
</html>
